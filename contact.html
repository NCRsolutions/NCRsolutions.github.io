<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - N.C.R Solutions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">N.C.R<span> SOLUTIONS</span></a>
        <nav><a href="index.html">← Retour à l'accueil</a></nav>
    </header>

    <div class="container" style="padding-top: 150px; max-width: 800px; text-align: center;">
        <div class="badge">Discutons de votre projet</div>
        <h1 style="font-size: 3.5rem; margin: 20px 0;">Contactez-nous</h1>
        <p style="font-size: 1.2rem; color: var(--text-dim); margin-bottom: 50px;">
            Une question ? Un besoin spécifique ou un devis ? Nacer et son équipe sont là pour vous répondre.
        </p>
        
        <div class="card" style="margin: 0 auto; max-width: 500px; display: flex; flex-direction: column; align-items: center;">
            <div class="icon-box" style="margin-bottom: 20px;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </div>
            <h3 style="font-size: 1.5rem; margin-bottom: 15px;">Par Email</h3>
            
            <a href="mailto:ncr-formations@outlook.fr" style="font-size: 1.4rem; color: var(--accent); text-decoration: none; font-weight: 800; transition: 0.3s;">
                ncr-formations@outlook.fr
            </a>
            
            <p style="margin-top: 25px; color: var(--text-dim); font-size: 0.9rem;">
                Nous répondons généralement sous 24 à 48 heures.
            </p>
        </div>
    </div>
</body>
</html>
